spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/bamburiti?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
# Para o "Esqueci a Senha"
# Usando variaveis de ambiente com seguranca
spring.mail.host=${EMAIL_SERVER}
spring.mail.port=${EMAIL_SERVER_PORT}
spring.mail.username=${EMAIL_ACCOUNT}
spring.mail.password=${EMAIL_APP_PASSWD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
